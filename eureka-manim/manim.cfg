[CLI]
# Output quality
quality = high_quality
# Resolution: 1920x1080 (Full HD)
pixel_height = 1080
pixel_width = 1920
# Frame rate: 60fps for smooth animations
frame_rate = 60
# Background color: Deep purple (Eureka brand color)
background_color = "#1e1b4b"

[output]
# Output directory
output_directory = ./output
# Video format
video_dir = ./output/videos
# Disable audio in Manim (we add Azure TTS separately)
disable_caching = False
write_to_movie = True
save_last_frame = False
